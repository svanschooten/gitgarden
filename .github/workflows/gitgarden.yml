name: Git Garden

on:
  workflow_call:
    inputs:
      target:
        description: 'Target repository URL where the garden will be published'
        required: false
        type: string
    secrets:
      GARDEN_TOKEN:
        description: 'Personal Access Token with push permissions (if target is a different repository)'
        required: false

jobs:
  gitgarden:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout Git Garden tool
        uses: actions/checkout@v4
        with:
          repository: svanschooten/gitgarden
          path: .git-garden-tool
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd .git-garden-tool
          npm install

      - name: Generate Garden
        run: |
          mkdir -p docs
          
          FROM_SHA="${{ github.event.before }}"
          TO_SHA="${{ github.sha }}"
          
          # If first run, FROM_SHA might be zeros
          if [ "$FROM_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$FROM_SHA" ]; then
            FROM_SHA=""
          fi
          
          node .git-garden-tool/cli.js generate --from "$FROM_SHA" --to "$TO_SHA"

      - name: Publish to Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: false # keep other docs
          silent: true
