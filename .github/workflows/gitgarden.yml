name: Git Garden

on:
  workflow_call:
    inputs:
      target:
        description: Repository where the garden should be published
        required: false
        type: string
        default: ""
      branch:
        description: Branch to publish to
        required: false
        type: string
        default: gh-pages
    secrets:
      GARDEN_TOKEN:
        required: false

permissions:
  contents: write

jobs:
  gitgarden:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout Git Garden tool
        uses: actions/checkout@v4
        with:
          repository: svanschooten/gitgarden
          path: .git-garden-tool
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: .git-garden-tool
        run: npm install

      - name: Determine commit range
        id: commits
        run: |
          FROM=$(git rev-parse HEAD~1 || echo "")
          TO=$(git rev-parse HEAD)
          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "to=$TO" >> $GITHUB_OUTPUT

      - name: Generate garden
        run: |
          mkdir -p docs
          node .git-garden-tool/cli.js generate \
            --from "${{ steps.commits.outputs.from }}" \
            --to "${{ steps.commits.outputs.to }}"

      - name: Publish Garden
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: ${{ inputs.target || github.repository }}
          token: ${{ secrets.GARDEN_TOKEN || secrets.GITHUB_TOKEN }}
          branch: ${{ inputs.branch }}
          folder: docs
          clean: false
          silent: true